name: Insider Analysis Pipeline

on:
  schedule:
    - cron: '0 13 * * *' # Runs daily at 1:00 PM UTC
  workflow_dispatch:      # Allows manual trigger via the "Actions" tab

jobs:
  run-insider-scripts:
    runs-on: ubuntu-latest
    
    # Optional: Add environment variables for your email script here
    env:
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Create and Setup Virtual Environment
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Insider Trade Tracker
        run: |
          source venv/bin/activate
          python Insider_Trade_Tracker.py

      - name: Find Executive Sentiments
        run: |
          source venv/bin/activate
          python FindExecutiveSentiments.py

      - name: Process Reports and Send Email
        run: |
          source venv/bin/activate
          python report_processor.py

      - name: Upload Logs/Results (Optional)
        if: always() # Upload even if a previous step failed
        uses: actions/upload-artifact@v4
        with:
          name: analysis-results
          path: |
            *.json
            *.csv
